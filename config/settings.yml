plugins:
  community_map_enabled:
    default: true
    client: true
    description: "Community Map aktivieren"

  community_map_location_field:
    default: "Stadt"
    client: false
    description: "Name des Custom User Fields fuer den Standort (z.B. 'Stadt' oder 'Ort')"

  community_map_position_field:
    default: ""
    client: false
    description: "Optionales Custom User Field fuer die Berufsbezeichnung (z.B. 'Beruf')"

  community_map_about_field:
    default: ""
    client: false
    description: "Optionales Custom User Field fuer die Kurzbeschreibung (z.B. 'Ueber mich')"

  community_map_allowed_groups:
    default: ""
    type: group_list
    client: false
    description: "Nur Mitglieder dieser Gruppen anzeigen (leer = alle User)"

  community_map_min_trust_level:
    default: 0
    type: integer
    min: 0
    max: 4
    client: false
    description: "Minimales Trust Level um auf der Map zu erscheinen"

  community_map_cache_duration_minutes:
    default: 60
    type: integer
    min: 5
    max: 1440
    client: false
    description: "Wie lange Geocoding-Ergebnisse gecacht werden (Minuten)"
